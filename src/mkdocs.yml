site_name: vassaro.github.io

docs_dir: ./docs
site_dir: ../docs

repo_url: https://github.com/vassaro/vassaro.github.io

nav:
  - Hem: index.md

theme:
  name: material
  logo: img/vassaro_logga_inv.png
  favicon: img/favicon.ico
  language: sv

markdown_extensions:
  - toc:
      baselevel: 1
  - attr_list
  - md_in_html
  - pymdownx.blocks.caption
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - glightbox
  - search